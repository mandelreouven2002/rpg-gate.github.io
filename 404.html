<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - העמוד לא נמצא</title>
    
    <!-- ייבוא פונט Assistant מ-Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- שימוש ב-Tailwind CSS לעיצוב מהיר ורספונסיבי -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* הגדרת הפונט לכל העמוד */
        body {
            font-family: 'Assistant', sans-serif;
        }

        /* הרקע המותאם אישית שביקשת */
        #background-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            background-image: url('/rpg-bg.png'); 
            background-repeat: repeat; 
            opacity: 0.025; 
            pointer-events: none; 
        }
    </style>
</head>
<body class="bg-[#FFFBEB] flex items-center justify-center min-h-screen relative overflow-hidden">
    <!-- שכבת הרקע -->
    <div id="background-overlay"></div>

    <!-- התוכן המרכזי -->
    <main class="text-center px-6 flex flex-col items-center w-full max-w-lg mx-auto relative z-10">
        
        <!-- תמונת 404 -->
        <div class="mb-8">
            <img src="/404-pic.png" alt="תמונת 404" class="mx-auto w-48 md:w-64 h-auto drop-shadow-lg">
        </div>

        <!-- כיתוב 404 -->
        <h1 class="text-8xl md:text-9xl font-extrabold text-gray-900 tracking-tighter mb-2">
            404
        </h1>

        <!-- טקסט משני -->
        <p class="text-xl md:text-2xl font-semibold text-gray-600 mb-10">
            העמוד המבוקש לא נמצא
        </p>

        <!-- כפתור חזרה -->
        <a href="/" class="block w-full max-w-xs bg-indigo-600 hover:bg-indigo-700 text-white text-lg font-bold py-4 px-8 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 ease-in-out transform hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-indigo-300">
            חזרה לעמוד הראשי
        </a>
        
    </main>
</body>
</html>
